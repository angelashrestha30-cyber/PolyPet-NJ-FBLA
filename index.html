<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PolyPet</title>
  <link href="styles.css" rel="stylesheet">
</head>
<body>
  <!-- NAVBAR -->
  <nav class="navbar">
    <div class="logo">🐾 PolyPet</div>
    <div class="nav-links">
      <a onclick="scrollToSection('home')">Home</a>
      <a onclick="scrollToSection('schedule')">Schedule</a>
      <a onclick="scrollToSection('resources')">Resources</a>
    </div>
  </nav>

  <!-- HERO -->
  <section id="home" class="hero section">
    <div class="hero-container">
      <div class="pet-panel">
        <div class="pet-avatar">🦊</div>
        <h3>Pika</h3>
        <p>Level <span id="level">1</span></p>
        <div class="xp-bar"><div id="xp-fill"></div></div>
        <p>🔥 <span id="streak">0</span> Day Streak</p>
        <button onclick="completeLesson()">Play</button>
      </div>
      <div class="speech-bubble">
        <h2 id="dynamicGreeting">Welcome Back, Emma!</h2>
      </div>
      <div class="lesson-cards">
        <div class="lesson-card float"><h4>Spanish Basics</h4><span class="lvl">Lv.2</span></div>
      </div>
    </div>
  </section>

  <!-- SCHEDULE -->
  <section id="schedule" class="section">
    <h2>Today's Schedule</h2>
    <div class="schedule-grid">
      <div class="event spanish"><h3>Spanish Lesson</h3><p>2:00 PM – 3:00 PM</p></div>
    </div>
  </section>

  <!-- RESOURCES -->
  <section id="resources" class="section">
    <h2>Resources</h2>
    <div class="menu-buttons">
      <button onclick="showResource('flashcards')">Flashcards</button>
      <button onclick="showResource('practice')">Practice Mode</button>
      <button onclick="showResource('test')">Unit Test</button>
    </div>

    <!-- FLASHCARDS -->
    <div id="flashcards" class="resource-content" style="display:none;">
      <div id="flashcard" class="flashcard">Click to Start</div>
      <button onclick="flipCard()">Flip</button>
      <button onclick="nextCard()">Next</button>
    </div>

    <!-- PRACTICE MODE -->
    <div id="practice" class="resource-content" style="display:none;">
      <h3>Practice Mode</h3>
      <div id="practice-box"></div>
      <p id="practiceResult"></p>
      <button onclick="nextPractice()">Next Exercise</button>
    </div>

    <!-- UNIT TEST -->
    <div id="test" class="resource-content" style="display:none;">
      <h3>Unit Test</h3>
      <form id="testForm"></form>
      <button onclick="submitTest()">Submit Test</button>
      <div id="testScore"></div>
      <div id="testFeedback"></div>
    </div>
  </section>

  <canvas id="confettiCanvas"></canvas>
  <footer>© 2026 PolyPet | NJ FBLA</footer>

  <script src="script.js"></script>
</body>
</html>
