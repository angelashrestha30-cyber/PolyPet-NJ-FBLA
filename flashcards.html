<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>PolyPet | Vocabulary Builder</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="module-container">

    <div class="module-header">
      <h1>Spanish Level 3</h1>
      <h2>Vocabulary Builder</h2>
      <p>Click the card to reveal the definition. Track mastery progress below.</p>
    </div>

    <div class="progress-bar">
      <div id="progressFill"></div>
    </div>
    <p id="progressText">Progress: 0%</p>

    <div class="flashcard" id="flashcard">
      <h3 id="word">Click Start</h3>
      <p id="definition"></p>
    </div>

    <div class="button-row">
      <button onclick="startFlashcards()">Start</button>
      <button onclick="nextCard()">Next</button>
      <button onclick="markMastered()">Mark Mastered</button>
    </div>

    <div class="completion" id="completionMessage"></div>

    <div class="nav-back">
      <a href="index.html">← Back to Module</a>
    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
